name: Product Catalog CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: product_catalog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d product_catalog_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      PORT: 5000
      APP_NAME: product-catalog-api

      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: product_catalog_test

      REDIS_HOST: localhost
      REDIS_PORT: 6379

      JWT_ACCESS_SECRET: test_access_secret_do_not_use_in_production
      JWT_REFRESH_SECRET: test_refresh_secret_do_not_use_in_production
      ACCESS_TOKEN_EXPIRES: 15m
      REFRESH_TOKEN_EXPIRES: 7d

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Database Migrations
        run: npm run migrate

      - name: Run Tests
        run: npm run test:coverage

      - name: Build Docker Image
        run: docker build -t product-catalog-api .

      - name: Verify Docker Image
        run: docker images
